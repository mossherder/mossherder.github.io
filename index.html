<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        :root {
            /* Handles the "notch" and home indicator areas on modern iPhones */
            --safe-area-top: env(safe-area-inset-top);
            --safe-area-bottom: env(safe-area-inset-bottom);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            /* Prevents text size adjustments after orientation changes */
            -webkit-text-size-adjust: 100%;
            /* Smoother scrolling on iOS */
            -webkit-overflow-scrolling: touch;
        }
        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(0,0,0,.1);
            border-radius: 50%;
            border-top-color: #000;
            animation: spin 1s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        [hidden] { display: none !important; }
    </style>
</head>
<body>
    <div id="track-info" style="text-align: center; margin-bottom: 20px;">
        <h2 style="margin: 0; font-size: 1.2rem;">
        <span id="song-title">Loading Show...</span>
        <span id="loading-percent" style="font-size: 0.8rem; color: #888; margin-left: 8px;" hidden>0%</span>        </h2>
        <p id="show-metadata" style="margin: 5px 0 0; font-size: 0.9rem; color: #666;">--</p>
    </div>
    
    <audio id="audio-player"></audio>
    
    <input type="range" id="seek-slider" value="0" max="100" step="0.1" style="width: 100%;">
    
    <div style="display: flex; justify-content: space-around; align-items: center; margin-top: 15px;">
        <button onclick="prevTrack()">Prev</button>
        <button onclick="changeTime(-10)">-10s</button>
        <button id="play-pause" onclick="togglePlay()" style="font-weight: bold; min-width: 60px;">Play</button>
        <button onclick="changeTime(10)">+10s</button>
        <button onclick="nextTrack()">Next</button>
    </div>
    
    <script>
        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-pause');
        const seekSlider = document.getElementById('seek-slider');
        
        const identifier = "gd1977-05-08.shure57.stevenson.29303.flac16";
        let playlist = [];
        let currentIndex = 0;
        
        async function fetchShow() {
            try {
                const response = await fetch(`https://archive.org/metadata/${identifier}`);
                const data = await response.json();
        
                // 1. Get Show Metadata
                const showInfo = `${data.metadata.date} • ${data.metadata.venue}`;
                document.getElementById('show-metadata').innerText = showInfo;
        
                // 2. Filter for audio files only and sort them alphabetically by name
                playlist = data.files
                    .filter(f => f.format === 'VBR MP3' || f.format === 'MP3')
                    .sort((a, b) => a.name.localeCompare(b.name));
        
                // 3. Load the first track (index 0)
                loadTrack(0);
        
            } catch (error) {
                console.error("Error loading show:", error);
            }
        }
        
        function loadTrack(index) {
            if (index < 0 || index >= playlist.length) return;
            
            currentIndex = index;
            const track = playlist[currentIndex];
            
            // Set source and update Title
            audio.src = `https://archive.org/download/${identifier}/${track.name}`;
            document.getElementById('song-title').innerText = track.title || track.name;
            
            // Auto-play when switching tracks (if already playing)
            if (!audio.paused || currentIndex > 0) {
                audio.play();
                playBtn.innerText = "Pause";
            }
        }
        
        function nextTrack() {
            if (currentIndex < playlist.length - 1) {
                loadTrack(currentIndex + 1);
            }
        }
        
        function prevTrack() {
            if (currentIndex > 0) {
                loadTrack(currentIndex - 1);
            }
        }
        
        // Control Logic
        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playBtn.innerText = "Pause";
            } else {
                audio.pause();
                playBtn.innerText = "Play";
            }
        }
        
        function changeTime(amount) {
            audio.currentTime += amount;
        }
        
        // Progress Bar Logic
        audio.addEventListener('timeupdate', () => {
            if (audio.duration) {
                seekSlider.value = (audio.currentTime / audio.duration) * 100;
            }
        });
        
        seekSlider.addEventListener('input', () => {
            audio.currentTime = (seekSlider.value / 100) * audio.duration;
        });
        
        // Auto-advance to next song when one ends
        audio.addEventListener('ended', nextTrack);
        
        // Initial Load
        fetchShow();
        
        const loadingPercent = document.getElementById('loading-percent');
        
        // Update percentage as the file downloads
        audio.addEventListener('progress', () => {
            if (audio.duration > 0) {
                for (let i = 0; i < audio.buffered.length; i++) {
                    // Check the buffer range that contains the current play time
                    if (audio.buffered.start(audio.buffered.length - 1 - i) < audio.currentTime) {
                        const loaded = audio.buffered.end(audio.buffered.length - 1 - i);
                        const percent = Math.round((loaded / audio.duration) * 100);
                        loadingPercent.innerText = `${percent}%`;
                        break;
                    }
                }
            }
        });
        
        // Show/Hide logic
        audio.addEventListener('waiting', () => {
            loadingPercent.hidden = false;
        });
        
        // Hide percentage as soon as it's possible to start playing
        audio.addEventListener('canplay', () => {
            loadingPercent.hidden = true;
        });
        
        // Use 'playing' as a backup to hide the percentage
        audio.addEventListener('playing', () => {
            loadingPercent.hidden = true;
        });
        
        function loadTrack(index) {
            if (index < 0 || index >= playlist.length) return;
            
            loadingPercent.innerText = "0%";
            loadingPercent.hidden = false;
            
            currentIndex = index;
            const track = playlist[currentIndex];
            
            // Resetting the source triggers the browser to open a new stream
            audio.src = `https://archive.org/download/${identifier}/${track.name}`;
            document.getElementById('song-title').innerText = track.title || track.name;
            
            // .play() tells the browser: "Start downloading and playing ASAP"
            audio.play().catch(e => {
                console.log("Playback delayed until user clicks Play");
                loadingPercent.hidden = true; // Hide if blocked by browser policy
            });
            
            playBtn.innerText = "Pause";
        }
    </script>
    
</body>
</html>
